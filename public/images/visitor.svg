<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0" stop-color="#ffecd1"/>
      <stop offset="1" stop-color="#ffd6a5"/>
    </linearGradient>
    <style>
      .bg{fill:url(#g2)}
      .card{fill:#fff8f0;stroke:#ffd6a5;stroke-width:2}
      .title{fill:#2b2b2b;font-family:Comic Sans MS, Arial, sans-serif;font-size:40px;font-weight:700}
      .muted{fill:#5b5b5b;font-family:Arial;font-size:16px}
      .chip{fill:#ffe5b4;stroke:#ffb86b}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675" rx="12"/>

  <!-- Left: playful avatar -->
  <g transform="translate(80,80)">
    <rect x="0" y="0" width="420" height="480" rx="16" class="card"/>
    <circle cx="210" cy="150" r="80" fill="#ffd6a5"/>
    <g transform="translate(180,130)">
      <circle cx="-10" cy="-10" r="8" fill="#2b2b2b"/>
      <circle cx="30" cy="-10" r="8" fill="#2b2b2b"/>
      <path d="M-20,10 q30,30 60,0" stroke="#2b2b2b" fill="none" stroke-width="6" stroke-linecap="round"/>
    </g>
    <text x="210" y="280" text-anchor="middle" class="title">Hey — I'm You!</text>
    <text x="210" y="310" text-anchor="middle" class="muted">Fun facts, hobbies, and an interactive timeline</text>
  </g>

  <!-- Right: interactive widgets -->
  <g transform="translate(540,60)">
    <text x="0" y="40" class="title">Visitor View</text>
    <rect x="0" y="60" width="620" height="520" rx="10" fill="#fff7ee" stroke="#ffd6a5"/>

    <g transform="translate(24,86)">
      <text x="0" y="0" class="muted">Interests</text>
      <g transform="translate(0,12)">
        <rect x="0" y="12" width="560" height="88" rx="8" fill="#fff0d9"/>
        <g transform="translate(12,34)" fill="#3b3b3b" font-family="Arial" font-size="14">
          <text>• Music producer & synth nerd</text>
          <text y="22">• Hiking, travel, and photography</text>
          <text y="44">• Coffee aficionado and home chef</text>
        </g>
      </g>

      <text x="0" y="140" class="muted">Interactive</text>
      <rect x="0" y="152" width="560" height="120" rx="8" fill="#fff0d9"/>
      <text x="12" y="188" fill="#3b3b3b" font-family="Arial" font-size="14">• Click to expand mini-games, music samples, or a playful timeline of my life</text>

      <text x="0" y="290" class="muted">Gallery</text>
      <rect x="0" y="304" width="560" height="120" rx="8" fill="#fff0d9"/>
      <g fill="#3b3b3b" font-family="Arial" font-size="14">
        <text x="12" y="332">• Photo trip to Alps • Analog synth setups • Coffee shots</text>
      </g>

      <text x="0" y="420" class="muted">Contact / Social</text>
      <rect x="0" y="432" width="560" height="60" rx="8" fill="#fff0d9"/>
      <text x="12" y="462" fill="#3b3b3b" font-family="Arial" font-size="14">• Twitter: @you • Instagram: @you • Send a friendly note</text>
    </g>
  </g>

  <text x="80" y="620" fill="#8a5a2e" font-family="Arial" font-size="12">Demo: Visitor-focused layout with playful UI, interactive widgets, and personal stories.</text>
</svg>